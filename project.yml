name: PaxCompanion
options:
  bundleIdPrefix: com.sushanth.paxcompanion
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES

targets:
  PaxCompanion:
    type: application
    platform: iOS
    sources:
      - path: PaxCompanion
      - path: PaxCompanionLiveActivity/GameAttributes.swift
    dependencies:
      - target: PaxCompanionWidget
        embed: true
        codeSign: true
    info:
      path: PaxCompanion/Info.plist
      properties:
        CFBundleDisplayName: Pax Companion
        UILaunchScreen:
          UIColorName: ""
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

  PaxCompanionWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PaxCompanionWidget
      - path: PaxCompanionLiveActivity/GameAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sushanth.paxcompanion.PaxCompanion.Widget
    info:
      path: PaxCompanionWidget/Info.plist
      properties:
        CFBundleDisplayName: Pax Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
